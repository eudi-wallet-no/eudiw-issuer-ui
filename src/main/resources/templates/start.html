<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="nn-no">
<head>
    <th:block th:replace="~{fragments/general :: base_head_fragment}"></th:block>
    <title>EUDIW sandkassa for digital lommebok: Bevisporten</title>
</head>

<body>
<header th:replace="~{fragments/general :: page_header_fragment}"></header>

<main>
    <div>
        <h1 class="ds-heading" data-size="lg">
            Vel bevis
        </h1>
        <p class="ds-paragraph">
            Start utferdig av bevis med Digdir sin generelle utferdar (issuer)
        </p>
    </div>
    <div class="flex-container">
        <a th:each="cc : ${credentialConfigurations}"
           th:href="@{/start-issuance?credential_configuration_id={id}(id = ${cc.id})}"
           class="ds-card" data-variant="neutral" style="max-width: 500px">
            <h2 class="ds-heading" th:text="${cc.title}">...</h2>
            <p class="ds-paragraph" data-variant="neutral" th:text="${cc.description}">...</p>
        </a>
    </div>

</main>

<footer th:replace="~{fragments/general :: page_footer_fragment(issuer=${issuerUrl})}"></footer>
</body>
</html>
